<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>מכלול · דו״חות גוש עציון</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&family=Heebo:wght@200;300;400;500;700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --paper:        #ECE5D4;
    --paper-2:      #E4DCC6;
    --paper-deep:   #DDD3B9;
    --ink:          #1A1812;
    --ink-2:        #3B342A;
    --muted:        #7A6F5E;
    --rule:         #BDB29A;
    --terra:        #B05A30;
    --terra-deep:   #8B3F1F;
    --olive:        #5A6A3E;
    --ochre:        #C99A3D;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: "Heebo", "Helvetica Neue", sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "tnum" 1, "kern" 1;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    opacity: 0.35;
    mix-blend-mode: multiply;
    background-image:
      radial-gradient(circle at 20% 30%, transparent 0, transparent 1px, rgba(58,52,42,0.04) 1.5px, transparent 2px),
      radial-gradient(circle at 75% 80%, transparent 0, transparent 1px, rgba(58,52,42,0.03) 1.5px, transparent 2px);
    background-size: 6px 6px, 9px 9px;
    z-index: 0;
  }
  ::selection { background: var(--terra); color: var(--paper); }

  .shell {
    position: relative;
    z-index: 1;
    max-width: 1600px;
    margin: 0 auto;
    padding: 28px 40px 0;
  }

  /* MASTHEAD */
  header.masthead {
    border-top: 2px solid var(--ink);
    border-bottom: 1px solid var(--ink);
    padding: 14px 0 16px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 32px;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink);
  }
  header .left, header .right { font-weight: 500; color: var(--muted); }
  header .center {
    text-align: center;
    letter-spacing: 0.36em;
    font-weight: 700;
  }
  header .center b {
    font-family: "Frank Ruhl Libre", serif;
    font-style: italic;
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    color: var(--terra);
    margin: 0 4px;
    font-size: 18px;
  }

  /* TAB BAR */
  .tabs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    border-bottom: 2px solid var(--ink);
    margin-top: 4px;
  }
  .tab {
    appearance: none;
    background: transparent;
    border: 0;
    border-left: 1px solid var(--rule);
    border-right: 1px solid var(--rule);
    cursor: pointer;
    padding: 22px 22px 20px;
    text-align: right;
    direction: rtl;
    color: var(--ink-2);
    font-family: "Heebo", sans-serif;
    transition: background 0.18s ease, color 0.18s ease;
    position: relative;
  }
  .tab + .tab { border-right: 0; }
  .tab:first-child { border-right: 0; }
  .tab:last-child { border-left: 0; }
  .tab:hover { background: rgba(176,90,48,0.06); }
  .tab .tab-eyebrow {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .tab .tab-title {
    font-family: "Frank Ruhl Libre", serif;
    font-size: 26px;
    font-weight: 500;
    line-height: 1.1;
    color: var(--ink);
  }
  .tab .tab-title em { font-style: italic; color: var(--terra-deep); }
  .tab .tab-sub {
    margin-top: 6px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.45;
  }
  .tab.active {
    background: var(--ink);
    color: var(--paper);
  }
  .tab.active .tab-eyebrow { color: rgba(236,229,212,0.6); }
  .tab.active .tab-title   { color: var(--paper); }
  .tab.active .tab-title em { color: var(--ochre); }
  .tab.active .tab-sub     { color: rgba(236,229,212,0.7); }
  .tab.active::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -2px;
    height: 2px;
    background: var(--terra);
  }

  /* SOURCE STRIP */
  .source-strip {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 32px;
    align-items: end;
    padding: 22px 0 18px;
    border-bottom: 1px solid var(--ink);
  }
  .source-strip .descr {
    font-family: "Frank Ruhl Libre", serif;
    font-size: 18px;
    line-height: 1.55;
    color: var(--ink-2);
    max-width: 90ch;
  }
  .source-strip .descr strong { color: var(--ink); font-weight: 700; }
  .source-strip .descr em { font-style: italic; color: var(--terra-deep); }
  .source-strip .meta {
    text-align: left;
    font-family: "Heebo", sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    line-height: 1.85;
    white-space: nowrap;
  }
  .source-strip .meta b {
    color: var(--ink);
    font-family: "Frank Ruhl Libre", serif;
    font-style: italic;
    font-size: 14px;
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
  }
  .source-strip .meta a {
    color: var(--terra-deep);
    text-decoration: none;
    border-bottom: 1px solid var(--terra);
    padding-bottom: 1px;
    font-family: "Frank Ruhl Libre", serif;
    font-style: italic;
    font-size: 14px;
    text-transform: none;
    letter-spacing: 0;
  }
  .source-strip .meta a:hover { color: var(--terra); }

  /* IFRAME WRAPPER */
  .frame-wrap {
    background: var(--paper-2);
    border-bottom: 1px solid var(--rule);
    margin: 0 -40px 0;
    padding: 0;
    box-shadow: inset 0 16px 24px -16px rgba(26,24,18,0.18);
  }
  .frame-wrap iframe {
    display: block;
    width: 100%;
    border: 0;
    background: var(--paper);
    min-height: 800px;
  }

  /* FOOTER */
  footer {
    padding: 28px 0;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 32px;
    align-items: center;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }
  footer .colophon {
    font-family: "Frank Ruhl Libre", serif;
    font-style: italic;
    font-size: 14px;
    letter-spacing: 0;
    text-transform: none;
    color: var(--ink-2);
    line-height: 1.5;
    text-align: center;
  }

  /* loading state */
  .loading {
    text-align: center;
    padding: 60px 0;
    font-family: "Frank Ruhl Libre", serif;
    font-style: italic;
    font-size: 20px;
    color: var(--muted);
  }

  @media (max-width: 900px) {
    .shell { padding: 18px 18px 0; }
    .tabs { grid-template-columns: 1fr; }
    .tab + .tab { border-right: 1px solid var(--rule); border-top: 0; }
    .tab { border: 1px solid var(--rule); border-bottom: 0; }
    .source-strip { grid-template-columns: 1fr; gap: 14px; }
    .source-strip .meta { text-align: right; white-space: normal; }
    .frame-wrap { margin: 0 -18px; }
  }
</style>
</head>

<body>
<div class="shell">

  <header class="masthead">
    <div class="left">המועצה האזורית · גוש עציון</div>
    <div class="center">המכלול · <b>אגף שירותים חברתיים</b> · ספריית דו״חות</div>
    <div class="right">מאי 2026</div>
  </header>

  <!-- TABS -->
  <nav class="tabs" role="tablist" aria-label="דו״חות">
    <button class="tab active" role="tab" aria-selected="true" data-tab="welfare">
      <div class="tab-eyebrow">סקירה רשותית</div>
      <div class="tab-title">דו״ח <em>רווחה</em></div>
      <div class="tab-sub">דמוגרפיה, ישובים, נזקקות, תקציב · אפריל 2026</div>
    </button>
    <button class="tab" role="tab" aria-selected="false" data-tab="strategy">
      <div class="tab-eyebrow">תזכיר אסטרטגי</div>
      <div class="tab-title">השקעה <em>חברתית</em></div>
      <div class="tab-sub">תשתיות טיפול, יעדים, פרויקטים · ‎T26 / AHTML</div>
    </button>
    <button class="tab" role="tab" aria-selected="false" data-tab="pniyot">
      <div class="tab-eyebrow">פניות שירות</div>
      <div class="tab-title">דו״ח <em>פניות</em></div>
      <div class="tab-sub">1,456 פניות, 17 חודשים · 2025–2026</div>
    </button>
  </nav>

  <!-- SOURCE STRIP (changes per tab) -->
  <div class="source-strip" id="source-strip">
    <div class="descr" id="source-descr"></div>
    <div class="meta"  id="source-meta"></div>
  </div>

</div><!-- /shell -->

<!-- IFRAME (kept outside shell for full-bleed feel; padded shell inside frame-wrap) -->
<div style="max-width: 1600px; margin: 0 auto; padding: 0 40px;">
  <div class="frame-wrap">
    <div class="loading" id="loading">טוען דו״ח…</div>
    <iframe id="dash-frame" title="dashboard" style="visibility:hidden;"></iframe>
  </div>
</div>

<div class="shell">
  <footer>
    <span>המכלול · גוש עציון</span>
    <span class="colophon">שלושה דו״חות, מקורות נפרדים, אותו צוות מקצועי.<br><span style="font-size:11px; opacity:0.6;">לחצו על שמות התבניות כדי לעבור ביניהן. כל דו״ח נשמר כקובץ עצמאי.</span></span>
    <span>נוסח 01</span>
  </footer>
</div>

<script>
const dashboards = {
  welfare: {
    file: 'dashboard.html',
    descr: `<strong>תמונת מצב רשותית מלאה</strong> לחודש אפריל 2026: 26,500 תושבים, 4,415 מקבלי שירות, פילוח דמוגרפי וטריטוריאלי, נזקקויות, תנועה בתיקים, תקציב וביצוע, ומסגרות הטיפול. כולל <em>מפה אינטראקטיבית</em> של 14 הישובים — ריחוף מציג שיעור מקבלי שירות, אשכול סוציו־אקונומי ופירוט מספרי.`,
    meta: `
      <span><b>מקור</b> &nbsp;·&nbsp; מערכת הרווחה + הלמ״ס</span><br>
      <span><b>דוחות־על</b> &nbsp;·&nbsp; T33 (תקציב שנתי) · T36 (ביצוע חודשי)</span><br>
      <span><b>קובץ</b> &nbsp;·&nbsp; <a href="מכלול_אקסל_לרשות_אפריל_עם_שמות.xlsx" download>מכלול_אקסל_לרשות_אפריל_עם_שמות.xlsx</a></span><br>
      <span><b>תקופה</b> &nbsp;·&nbsp; אפריל 2026 (חתך חודשי)</span>
    `
  },
  strategy: {
    file: 'dashboard_lyron.html',
    descr: `<strong>תזכיר אסטרטגי להשקעה חברתית</strong> — דו״ח עומק על תשתיות הטיפול, פילוח אשכולות סוציו־אקונומיים, מאפייני נזקקות לפרט, קישור מקרי שירות ליעדי תכנון, ופרויקטים פעילים. דגש על הצלבת <em>נתוני תקציב</em> עם <em>תוצאות שטח</em>.`,
    meta: `
      <span><b>מקור</b> &nbsp;·&nbsp; מערכת רווחה + הלמ״ס 2024</span><br>
      <span><b>דוחות־על</b> &nbsp;·&nbsp; T26 · T39 · AHTML (4)–(7), (11), (14), (16)</span><br>
      <span><b>קובץ</b> &nbsp;·&nbsp; <a href="מכלול_אקסל_לרשות_אפריל_עם_שמות.xlsx" download>מכלול_אקסל_לרשות_אפריל_עם_שמות.xlsx</a></span><br>
      <span><b>תקופה</b> &nbsp;·&nbsp; אפריל 2026 · 807 השמות פעילות · 1,821 פרטים עם נזקקות</span>
    `
  },
  pniyot: {
    file: 'dashboard_pniyot.html',
    descr: `<strong>1,456 פניות שירות</strong> שהתקבלו במזכירות שירותים חברתיים בין ינואר 2025 לאמצע מאי 2026. הדו״ח פורש כמות, קצב, חלוקה למחלקות, זמני סגירה, עמידה ביעד SLA והשוואת YoY 2025 ↔ 2026. <em>כל מספר אומת ישירות מול קובץ המקור.</em>`,
    meta: `
      <span><b>מקור</b> &nbsp;·&nbsp; מערכת המוקד</span><br>
      <span><b>תאריך הפקה</b> &nbsp;·&nbsp; 14/05/2026 15:13</span><br>
      <span><b>קובץ</b> &nbsp;·&nbsp; <a href="ללא שם 14052026 1513 רווחה 2025 -2026.xlsx" download>ללא שם 14052026 1513 רווחה 2025 -2026.xlsx</a></span><br>
      <span><b>תקופה</b> &nbsp;·&nbsp; 01/01/2025 → 13/05/2026 · 497 ימים · 1,456 שורות</span>
    `
  }
};

const iframe = document.getElementById('dash-frame');
const loading = document.getElementById('loading');
const descr = document.getElementById('source-descr');
const meta = document.getElementById('source-meta');

function activate(name) {
  const d = dashboards[name];
  if (!d) return;
  // tabs
  document.querySelectorAll('.tab').forEach(t => {
    const on = t.dataset.tab === name;
    t.classList.toggle('active', on);
    t.setAttribute('aria-selected', on ? 'true' : 'false');
  });
  // source strip
  descr.innerHTML = d.descr;
  meta.innerHTML = d.meta;
  // iframe
  loading.style.display = 'block';
  iframe.style.visibility = 'hidden';
  iframe.src = d.file;
  // reset hash
  if (location.hash !== '#' + name) history.replaceState(null, '', '#' + name);
}

iframe.addEventListener('load', () => {
  loading.style.display = 'none';
  iframe.style.visibility = 'visible';
  resizeIframe();
  // resize again after charts/fonts likely settled
  setTimeout(resizeIframe, 600);
  setTimeout(resizeIframe, 1500);
});

function resizeIframe() {
  try {
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    if (!doc) return;
    const h = Math.max(
      doc.documentElement.scrollHeight,
      doc.body ? doc.body.scrollHeight : 0
    );
    iframe.style.height = (h + 20) + 'px';
  } catch (e) {
    iframe.style.height = '2400px';
  }
}

// Observe iframe document mutations so dynamic chart growth re-sizes
let resizeTimer;
function watchIframe() {
  try {
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    if (!doc || !doc.body) return;
    const ro = new ResizeObserver(() => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(resizeIframe, 100);
    });
    ro.observe(doc.body);
  } catch (e) { /* cross-origin or not ready */ }
}
iframe.addEventListener('load', () => setTimeout(watchIframe, 250));

// Resize on window resize (charts adapt, height may shift)
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(resizeIframe, 150);
});

// Tab clicks
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => activate(t.dataset.tab));
});

// Initial tab from URL hash, else default
const initial = (location.hash || '').replace('#', '');
activate(dashboards[initial] ? initial : 'welfare');
</script>
</body>
</html>
